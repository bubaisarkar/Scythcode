<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Processing - Medusa Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 1s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .success-icon {
            color: #28a745;
        }
        
        .processing-icon {
            color: #667eea;
        }
        
        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 32px;
        }
        
        p {
            color: #666;
            line-height: 1.8;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .highlight {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-weight: bold;
            color: #667eea;
        }
        
        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .close-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        
        .close-btn:hover {
            background: #5a6fd8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .info-box {
            background: #e8f4fd;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
            border-radius: 5px;
        }
        
        .info-box strong {
            color: #667eea;
        }
        
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon processing-icon" id="icon">⏳</div>
        <h1 id="title">Processing Payment...</h1>
        <div id="content">
            <div class="spinner"></div>
            <p>Please wait while we verify your payment with PayPal.</p>
            <p><strong>Do not close this window.</strong></p>
            
            <div class="info-box">
                <strong>📋 What's happening:</strong><br>
                • Verifying payment status<br>
                • Generating your redemption code<br>
                • Preparing Discord notification
            </div>
        </div>
        
        <div class="footer">
            Medusa Store © 2025 | Secure Payment Processing
        </div>
    </div>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const payerId = urlParams.get('PayerID');
        
        console.log('Payment Success Page Loaded');
        console.log('Token:', token);
        console.log('PayerID:', payerId);
        
        // Function to show success
        function showSuccess() {
            document.getElementById('icon').innerHTML = '✅';
            document.getElementById('icon').className = 'icon success-icon';
            document.getElementById('title').innerHTML = 'Payment Successful!';
            document.getElementById('content').innerHTML = `
                <p>🎉 Your payment has been processed successfully!</p>
                
                <div class="highlight">
                    You will receive your redemption code via Discord DM within 1-2 minutes.
                </div>
                
                <div class="info-box">
                    <strong>✅ Next Steps:</strong><br>
                    • Check your Discord DMs<br>
                    • Look for a message from Medusa Store Bot<br>
                    • Your redemption code will be there!
                </div>
                
                <p style="font-size: 14px; color: #999;">
                    You can safely close this window now.
                </p>
                
                <button class="close-btn" onclick="closeWindow()">Close Window</button>
            `;
        }
        
        // Function to close window
        function closeWindow() {
            window.close();
            // If window.close() doesn't work (some browsers block it)
            setTimeout(() => {
                document.getElementById('content').innerHTML += `
                    <p style="margin-top: 20px; color: #999;">
                        If the window didn't close automatically, you can close it manually.
                    </p>
                `;
            }, 500);
        }
        
        // Simulate processing and show success after 2 seconds
        if (token && payerId) {
            setTimeout(() => {
                showSuccess();
            }, 2000);
        } else {
            // No payment info found
            document.getElementById('icon').innerHTML = '❌';
            document.getElementById('icon').className = 'icon';
            document.getElementById('title').innerHTML = 'Invalid Payment';
            document.getElementById('content').innerHTML = `
                <p>We couldn't find your payment information.</p>
                <p>Please try again or contact support.</p>
                <button class="close-btn" onclick="closeWindow()">Close Window</button>
            `;
        }
    </script>
</body>
</html>
